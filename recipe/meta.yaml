{% set name = "vertica-python" %}
{% set version = "1.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/vertica-python-{{ version }}.tar.gz
  sha256: 542078ae2fedee694adedb04d81c6edc277b87ed7440302942107d86a0bcd445

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip

  run:
    - python >={{ python_min }}
    - python-dateutil >=1.5
    - six >=1.10.0

test:
  imports:
    - vertica_python
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/vertica/vertica-python
  license_file: LICENSE
  license: Apache-2.0
  summary: Official native Python client for the Vertica Analytics Database.

extra:
  recipe-maintainers:
    - vertica-cla
    - sitingren
    - pmlandwehr
